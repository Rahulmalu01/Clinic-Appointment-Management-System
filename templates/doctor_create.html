{% extends "base.html" %}

{% block title %}Create Doctor - Healthcare System{% endblock %}

{% block content %}
<div class="container">
    <h2>➕ Create Doctor</h2>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="/admin/doctors/">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="doctor username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="password">
        </div>
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Doctor full name">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="doctor@example.com">
        </div>
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" name="phone" placeholder="Phone number">
        </div>
        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" placeholder="Clinic address">
        </div>
        <div class="form-group">
            <label for="specialty">Specialty</label>
            <input type="text" id="specialty" name="specialty" placeholder="e.g., Cardiology">
        </div>
        <div class="form-group">
            <label for="details">Details</label>
            <textarea id="details" name="details" placeholder="Additional details"></textarea>
        </div>
        <button type="submit">Create Doctor</button>
    </form>
</div>
{% endblock %}
